name: Process Update
on:
  release:
    types:
      - published

env:
  WPORG_PLUGIN_SLUG: gone-control

concurrency:
  group: process-update-${{ github.event.release.id }}
  cancel-in-progress: false

permissions: write-all
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the source code
        uses: actions/checkout@v3

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          version="$(printf '%s' '${{ github.event.release.tag_name }}' | sed -E 's/^version-//I; s/^v-?//I')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_name=${WPORG_PLUGIN_SLUG}-${version}.zip" >> "$GITHUB_OUTPUT"

      - uses: shivammathur/setup-php@v2
        name: Set up PHP
        with:
          php-version: 7.4
          coverage: none

      - name: Install PHP Dependencies
        uses: ramsey/composer-install@v2
        with:
          working-directory: plugin-dir
          composer-options: "--no-dev"

      - name: Remove all files and directories except plugin directory
        run: |
          find . -mindepth 1 -maxdepth 1 -not -name 'plugin-dir' -not -name '.git' -exec rm -rf {} +

      # Rename plugin directory to the plugin name
      - run: mv plugin-dir "$WPORG_PLUGIN_SLUG"

      # Zip the plugin directory
      - name: Zip the plugin directory
        run: zip -r "${{ steps.release_meta.outputs.zip_name }}" "$WPORG_PLUGIN_SLUG"

      - name: Check existing release artifact
        id: release_asset
        uses: actions/github-script@v7
        env:
          RELEASE_ASSET_NAME: ${{ steps.release_meta.outputs.zip_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = context.payload.release.tag_name;
            const assetName = process.env.RELEASE_ASSET_NAME;

            const release = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });

            const assetExists = release.data.assets.some((asset) => asset.name === assetName);
            core.setOutput("exists", assetExists ? "true" : "false");

      - name: Upload Release Artifact
        if: steps.release_asset.outputs.exists != 'true'
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ./${{ steps.release_meta.outputs.zip_name }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip Release Artifact Upload
        if: steps.release_asset.outputs.exists == 'true'
        run: echo "Release asset ${{ steps.release_meta.outputs.zip_name }} already exists. Skipping upload."

      - name: Set target branch
        id: branch
        run: echo "branch_name=$([ '${{ github.event.release.prerelease }}' == 'true' ] && echo 'pre-release' || echo 'stable')" >> "$GITHUB_OUTPUT"

      - name: Push to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          export TEMP_DIR=$(mktemp -d)
          cp -r "$WPORG_PLUGIN_SLUG"/* "$TEMP_DIR/"

          git fetch origin ${{ steps.branch.outputs.branch_name }} || true
          git worktree add --force dist-worktree origin/${{ steps.branch.outputs.branch_name }}

          rm -rf dist-worktree/*
          cp -r "$TEMP_DIR/"* dist-worktree/

          cd dist-worktree
          git add -f vendor
          git add .
          git commit -m "Update plugin build from release ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push origin HEAD:${{ steps.branch.outputs.branch_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to WordPress.org (production only)
        if: ${{ github.event.release.prerelease == false }}
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_PASSWORD }}
          BUILD_DIR: ./${{ env.WPORG_PLUGIN_SLUG }}
          SLUG: ${{ env.WPORG_PLUGIN_SLUG }}
          VERSION: ${{ steps.release_meta.outputs.version }}
